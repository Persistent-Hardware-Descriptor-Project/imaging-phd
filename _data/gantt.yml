# Gantt Chart Data
# =================
# periods: the 8 semi-annual column headers (display labels only)
# objectives: list of objectives, each with deliverables
#
# Each deliverable has:
#   id:    display number (e.g. "1-1")
#   title: deliverable title
#   link:  optional URL to project page (leave blank for now)
#   cells: list of table cells — spans must add up to 8
#
# Each cell has:
#   span:  number of columns this cell covers (1-8)
#   type:  empty | active | development | support
#          empty       = no fill
#          active      = filled bar, no label (used for obj 1 and 4)
#          development = filled bar with label
#          support     = lighter bar with label
#   label: optional text inside the bar

periods:
  - "Yr. 1-1"
  - "Yr. 1-2"
  - "Yr. 2-1"
  - "Yr. 2-2"
  - "Yr. 3-1"
  - "Yr. 3-2"
  - "Yr. 4-1"
  - "Yr. 4-2"

objectives:

  - id: obj-1
    label: "1 - Definition of NGM"
    color: green
    deliverables:
      - id: "1-1"
        title: "Core Linked Data Framework"
        link:
        cells:
          - span: 1
            type: active
          - span: 7
            type: empty

      - id: "1-2"
        title: "Hardware Descriptor Schema"
        link:
        cells:
          - span: 2
            type: active
          - span: 6
            type: empty

